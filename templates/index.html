<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kactii News</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar" role="banner">
    <nav class="nav-inner" aria-label="Main navigation">
      <a href="/" class="logo" aria-label="Kactii News home">
        <span class="logo-bracket">[</span>Kactii<span class="logo-bracket">]</span>
        <span class="logo-sub">News</span>
      </a>
      <div class="nav-actions">
        <a href="/posts" class="nav-link-btn">Posts</a>
        <a href="/submit" class="btn-submit">Submit</a>
      </div>
    </nav>
  </header>

  <!-- HERO / LANDING -->
  <main class="hero-container">
    <div class="hero">
      <div class="hero-logo" aria-hidden="true">
        <span class="hero-bracket">[</span>K<span class="hero-bracket">]</span>
      </div>
      <h1 class="hero-title">Kactii News</h1>
      <p class="hero-desc">A community for curious developers. Share links, spark discussions, discover what matters.</p>
      <div class="hero-actions">
        <a href="/submit" class="btn-hero-primary">Submit a Post</a>
        <a href="/posts" class="btn-hero-secondary">Browse Posts</a>
      </div>
    </div>
  </main>

</body>
</html>
