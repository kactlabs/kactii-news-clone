<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit — Kactii News</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar" role="banner">
    <nav class="nav-inner" aria-label="Main navigation">
      <a href="/" class="logo" aria-label="Kactii News home">
        <span class="logo-bracket">[</span>Kactii<span class="logo-bracket">]</span>
        <span class="logo-sub">News</span>
      </a>
      <div class="nav-actions">
        <a href="/posts" class="nav-link-btn">Posts</a>
        <a href="/submit" class="btn-submit">Submit</a>
      </div>
    </nav>
  </header>

  <!-- SUBMIT FORM PAGE -->
  <main class="container">
    <div class="form-page">

      <div class="form-page-header">
        <h1>Submit a Post</h1>
        <p>Share a link or start a discussion with the community.</p>
      </div>

      <form id="submit-form" class="submit-card" novalidate>

        <div class="form-group">
          <label for="post-title">Title <span class="required" aria-hidden="true">*</span></label>
          <input
            type="text"
            id="post-title"
            name="title"
            placeholder="What's this about?"
            required
            aria-required="true"
            autocomplete="off"
          />
          <span class="field-error" id="title-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="post-url">URL <span class="optional">(optional)</span></label>
          <input
            type="url"
            id="post-url"
            name="url"
            placeholder="https://example.com"
          />
          <span class="field-error" id="url-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="post-author">Author <span class="required" aria-hidden="true">*</span></label>
          <input
            type="text"
            id="post-author"
            name="author"
            placeholder="Your username"
            required
            aria-required="true"
            autocomplete="off"
          />
          <span class="field-error" id="author-error" role="alert"></span>
        </div>

        <div class="form-actions">
          <a href="/" class="btn-cancel">Cancel</a>
          <button type="submit" class="btn-primary">Submit Post</button>
        </div>

      </form>
    </div>
  </main>

  <script src="/static/submit.js"></script>
</body>
</html>
